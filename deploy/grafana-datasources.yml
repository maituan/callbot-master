apiVersion: 1

# Auto-provision Prometheus datasource so Grafana picks it up on first
# boot. Host networking → 127.0.0.1:19090 (Prometheus listen port).
# UID is hardcoded so dashboard JSON files can reference it
# deterministically across redeploys.
datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://127.0.0.1:19090
    isDefault: true
    editable: true
