# Local stack for callbot-master.
#
# What's included:
#   master      — the Go service (built from ../Dockerfile)
#   postgres    — call_history persistence
#   prometheus  — scrapes master:/metrics
#   grafana     — dashboards (anonymous viewer for dev convenience)
#
# What's NOT included (bring your own):
#   - FreeSWITCH ESL (use host networking or set MASTER_FS_HOST to your FS box)
#   - callbot-hcc-base-ts bot (run via `bun run dev` from sibling dir)
#   - Tempo / Jaeger for OTLP traces (set OTEL_EXPORTER_OTLP_ENDPOINT to enable)
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up --build
#   curl http://localhost:18083/health

services:
  master:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: callbot-master:dev
    container_name: callbot-master
    # Host networking lets master reach FS on the LAN (ESL on host:8021) and
    # share /dev/shm with FreeSWITCH for FIFOs. If your FS lives elsewhere,
    # switch to bridge + set MASTER_FS_HOST=fs-box:8021.
    network_mode: host
    environment:
      MASTER_HTTP_ADDR: ":18083"
      MASTER_FS_HOST: "127.0.0.1:8021"
      MASTER_FS_PASSWORD: "ClueCon"
      MASTER_BOT_URL: "http://localhost:11006/api/v1/call/"
      MASTER_ASR_ENDPOINT: "103.253.20.28:9000"
      MASTER_ASR_TOKEN: "${MASTER_ASR_TOKEN:-}"
      MASTER_TTS_ENDPOINT: "ws://103.253.20.27:8767"
      MASTER_TTS_TOKEN: "${MASTER_TTS_TOKEN:-}"
      MASTER_TTS_VOICE_ID: "${MASTER_TTS_VOICE_ID:-thuyanh-north}"
      MASTER_INBOUND_DID: "${MASTER_INBOUND_DID:-5000000024}"
      MASTER_BARGE_IN: "${MASTER_BARGE_IN:-false}"
      MASTER_PG_DSN: "postgres://callbot:callbot@127.0.0.1:5432/callbot?sslmode=disable"
      MASTER_LOG_LEVEL: "${MASTER_LOG_LEVEL:-info}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-}"
      OTEL_SERVICE_NAME: "callbot-master"
      MASTER_OTEL_INSECURE: "true"
    volumes:
      # Shared with FreeSWITCH on the host: master writes TTS, reads recordings.
      - /dev/shm/bridge:/dev/shm/bridge
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: callbot-postgres
    network_mode: host
    environment:
      POSTGRES_USER: callbot
      POSTGRES_PASSWORD: callbot
      POSTGRES_DB: callbot
      POSTGRES_HOST_AUTH_METHOD: trust # local dev only
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callbot -d callbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: callbot-prometheus
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.listen-address=:19090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: callbot-grafana
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "13000"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
