# Local stack for callbot-master.
#
# What's included:
#   master      — the Go service (built from ../Dockerfile)
#   ui          — Next.js ops console on :3001 (built from ../../callbot-master-ui)
#   postgres    — call_history persistence
#   prometheus  — scrapes master:/metrics
#   grafana     — dashboards (anonymous viewer for dev convenience)
#   jaeger      — OTLP trace receiver + UI on :16686 (in-memory storage)
#
# What's NOT included (bring your own):
#   - FreeSWITCH ESL (use host networking or set MASTER_FS_HOST to your FS box)
#   - callbot-hcc-base-ts bot (run via `bun run dev` from sibling dir)
#
# Usage:
#   docker compose -f deploy/docker-compose.yml up --build
#   curl http://localhost:18083/health

services:
  master:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: callbot-master:dev
    container_name: callbot-master
    # Host networking lets master reach FS on the LAN (ESL on host:8021) and
    # share /dev/shm with FreeSWITCH for FIFOs. If your FS lives elsewhere,
    # switch to bridge + set MASTER_FS_HOST=fs-box:8021.
    network_mode: host
    # Every value below can be overridden by exporting the var before
    # `docker compose up`, or by writing a `.env` next to this file.
    # Sensible defaults match the lab/dev setup; production should override.
    environment:
      MASTER_HTTP_ADDR: "${MASTER_HTTP_ADDR:-:18083}"
      MASTER_FS_HOST: "${MASTER_FS_HOST:-127.0.0.1:8021}"
      MASTER_FS_PASSWORD: "${MASTER_FS_PASSWORD:-ClueCon}"
      MASTER_FS_DOMAIN: "${MASTER_FS_DOMAIN:-voiceai.autotele.vn}"
      MASTER_BOT_URL: "${MASTER_BOT_URL:-http://localhost:11006/api/v1/call/}"
      MASTER_BOT_FIRST_BYTE_TIMEOUT: "${MASTER_BOT_FIRST_BYTE_TIMEOUT:-5s}"
      MASTER_BOT_TOTAL_TIMEOUT: "${MASTER_BOT_TOTAL_TIMEOUT:-25s}"
      MASTER_ASR_ENDPOINT: "${MASTER_ASR_ENDPOINT:-103.253.20.28:9000}"
      MASTER_ASR_TOKEN: "${MASTER_ASR_TOKEN:-}"
      # Viettel ASR đòi integer seconds — đặt nguyên giây (vd 1s, 5s, 30s).
      # Sub-second config sẽ bị round up phía client.
      MASTER_ASR_SILENCE_TIMEOUT: "${MASTER_ASR_SILENCE_TIMEOUT:-5s}"
      MASTER_ASR_SPEECH_TIMEOUT: "${MASTER_ASR_SPEECH_TIMEOUT:-1s}"
      MASTER_ASR_SPEECH_MAX: "${MASTER_ASR_SPEECH_MAX:-30s}"
      MASTER_TTS_ENDPOINT: "${MASTER_TTS_ENDPOINT:-ws://103.253.20.27:8767}"
      MASTER_TTS_TOKEN: "${MASTER_TTS_TOKEN:-}"
      MASTER_TTS_VOICE_ID: "${MASTER_TTS_VOICE_ID:-thuyanh-north}"
      MASTER_INBOUND_DID: "${MASTER_INBOUND_DID:-5000000024}"
      MASTER_INBOUND_SCENARIO: "${MASTER_INBOUND_SCENARIO:-hcc-inbound}"
      MASTER_BARGE_IN: "${MASTER_BARGE_IN:-false}"
      MASTER_BARGE_MIN_WORDS: "${MASTER_BARGE_MIN_WORDS:-3}"
      # Compose-managed postgres is on bridge net at 127.0.0.1:5433. To
      # use a different DB (e.g. host's own pg on 5432, or a managed
      # cloud DB), export MASTER_PG_DSN and skip the postgres service.
      MASTER_PG_DSN: "${MASTER_PG_DSN:-postgres://callbot:callbot@127.0.0.1:5433/callbot?sslmode=disable}"
      MASTER_RECORDING_SOURCE_DIR: "${MASTER_RECORDING_SOURCE_DIR:-/var/lib/freeswitch/recordings/voiceai-hotline}"
      # Comma-separated list of additional dirs FS may write recordings
      # to (e.g. outbound dialplan writes to /var/lib/freeswitch/recordings/voiceai).
      # The archiver scans every dir on each retry until the file shows up.
      MASTER_RECORDING_SOURCE_DIRS: "${MASTER_RECORDING_SOURCE_DIRS:-/var/lib/freeswitch/recordings/voiceai-hotline,/var/lib/freeswitch/recordings/voiceai}"
      MASTER_RECORDING_ARCHIVE_DIR: "${MASTER_RECORDING_ARCHIVE_DIR:-/var/lib/callbot/recordings}"
      MASTER_RECORDING_URL_PREFIX: "${MASTER_RECORDING_URL_PREFIX:-/recordings}"
      MASTER_RECORDING_FILE_EXT: "${MASTER_RECORDING_FILE_EXT:-.mp3}"
      MASTER_FILLER_DIR: "${MASTER_FILLER_DIR:-/var/lib/callbot/fillers}"
      MASTER_LOG_LEVEL: "${MASTER_LOG_LEVEL:-info}"
      MASTER_LOG_FORMAT: "${MASTER_LOG_FORMAT:-json}"
      # Set to the UI origin (e.g. http://localhost:3001) when running the
      # ops UI on a separate port. "" disables CORS entirely.
      MASTER_CORS_ALLOW_ORIGIN: "${MASTER_CORS_ALLOW_ORIGIN:-http://localhost:3001}"
      # Auth: JWT secret (≥32 chars) + bootstrap platform admin. Master
      # refuses to authenticate logins until both are set.
      MASTER_JWT_SECRET: "${MASTER_JWT_SECRET:-}"
      MASTER_JWT_TTL: "${MASTER_JWT_TTL:-12h}"
      MASTER_PLATFORM_ADMIN_USER: "${MASTER_PLATFORM_ADMIN_USER:-admin}"
      MASTER_PLATFORM_ADMIN_PASSWORD: "${MASTER_PLATFORM_ADMIN_PASSWORD:-}"
      MASTER_COOKIE_SECURE: "${MASTER_COOKIE_SECURE:-false}"
      OTEL_EXPORTER_OTLP_ENDPOINT: "${OTEL_EXPORTER_OTLP_ENDPOINT:-127.0.0.1:14317}"
      OTEL_SERVICE_NAME: "${OTEL_SERVICE_NAME:-callbot-master}"
      MASTER_OTEL_INSECURE: "${MASTER_OTEL_INSECURE:-true}"
    volumes:
      # Shared with FreeSWITCH on the host: master writes TTS, reads recordings.
      - /dev/shm/bridge:/dev/shm/bridge
      # FS-side stereo MP3 recordings — read-only, master archives them out.
      - /var/lib/freeswitch/recordings:/var/lib/freeswitch/recordings:ro
      # Persistent archive — master writes here; HTTP serves under /recordings.
      - /var/lib/callbot/recordings:/var/lib/callbot/recordings
      # Filler audio per voice — read-only. Layout: {voice_id}/*.wav.
      - /var/lib/callbot/fillers:/var/lib/callbot/fillers:ro
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: callbot-postgres
    # Bridge network with explicit 127.0.0.1 binding so we don't fight the
    # host's existing postgres on 5432. Master reaches us via host loopback.
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: callbot
      POSTGRES_PASSWORD: callbot
      POSTGRES_DB: callbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U callbot -d callbot"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: callbot-prometheus
    network_mode: host
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=7d
      - --web.listen-address=:19090
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    restart: unless-stopped

  jaeger:
    # All-in-one Jaeger: in-memory span storage (lost on restart) — fine
    # for dev/single-host. For prod, swap to Tempo or self-hosted Jaeger
    # with persistent backend.
    #
    # We use bridge networking + explicit port maps because the env-var
    # port override in jaeger 1.60 is unreliable. Host-side ports stay in
    # the 1xxxx range to avoid conflicts; container-side keeps defaults.
    image: jaegertracing/all-in-one:1.60
    container_name: callbot-jaeger
    ports:
      - "14317:4317"   # OTLP gRPC — master sends spans here
      - "14318:4318"   # OTLP HTTP
      - "16686:16686"  # Query UI
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      MEMORY_MAX_TRACES: "50000"
      # Silence jaeger's own self-telemetry — by default it tries to
      # send its internal spans to localhost:4317 inside the container
      # (which IS the receiver itself, but timing of startup makes the
      # first attempts race).
      OTEL_TRACES_EXPORTER: "none"
    restart: unless-stopped

  ui:
    # Ops console — Next.js. Builds from the sibling callbot-master-ui repo
    # checked out at ../../callbot-master-ui (one level above this repo).
    # The bundle gets NEXT_PUBLIC_MASTER_URL baked in at build time; in dev
    # it points at host:18083 so the browser can reach master via host net.
    build:
      context: ../../callbot-master-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_MASTER_URL: "${UI_MASTER_URL:-http://localhost:18083}"
        # Sidebar "Dashboard" link target. Leave empty to fall back to
        # /metrics (raw Prometheus exposition, useful for debugging
        # scrape config). Point at Grafana for the human-friendly
        # dashboards.
        NEXT_PUBLIC_GRAFANA_URL: "${UI_GRAFANA_URL:-}"
    image: callbot-master-ui:dev
    container_name: callbot-master-ui
    network_mode: host
    environment:
      PORT: "${UI_PORT:-3001}"
      NEXT_PUBLIC_MASTER_URL: "${UI_MASTER_URL:-http://localhost:18083}"
      NEXT_PUBLIC_GRAFANA_URL: "${UI_GRAFANA_URL:-}"
    depends_on:
      - master
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.2.0
    container_name: callbot-grafana
    network_mode: host
    environment:
      GF_SERVER_HTTP_PORT: "13000"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    volumes:
      - ./grafana-datasources.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
      - ./grafana-dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  pgdata:
  promdata:
  grafanadata:
